# InterviewPad — Rustpad (collaborative editor) + ptyd (interactive terminal
# runner), fronted by Caddy for automatic HTTPS.
#
# Code runs in an interactive PTY: ptyd launches each run in a sandboxed sibling
# container (via the mounted docker socket) and streams the terminal over a
# WebSocket, so interviewer and candidate share one live terminal.

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "1"

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - rustpad
      - ptyd
    <<: *default-logging

  rustpad:
    # Prefer the CI-built image (fast pull); `--build` rebuilds locally instead.
    image: ${RUSTPAD_IMAGE:-ghcr.io/rebar-team/interview-pad-rustpad:latest}
    build: ./rustpad
    restart: always
    environment:
      SQLITE_URI: /data/rustpad.db
      EXPIRY_DAYS: ${EXPIRY_DAYS:-30}
      RUST_LOG: info
    volumes:
      - rustpad-data:/data
    <<: *default-logging

  ptyd:
    build: ./ptyd
    restart: always
    environment:
      # Compose prefixes volume names with the project (dir) name.
      SESSIONS_VOLUME: interview-pad_pty-sessions
      SESSIONS_DIR: /sessions
    volumes:
      # ptyd launches sandboxed sibling containers on the host's Docker.
      - /var/run/docker.sock:/var/run/docker.sock
      # Code for each run is written here and bind-mounted into the run container.
      - pty-sessions:/sessions
    <<: *default-logging

volumes:
  caddy-data:
  caddy-config:
  rustpad-data:
  pty-sessions:
