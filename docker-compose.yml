# InterviewPad — Rustpad (collaborative editor) + Judge0 (code execution),
# fronted by Caddy for automatic HTTPS.
#
# Judge0's isolate sandbox needs privileged containers + cgroup access, which
# is why this runs on a plain VM (EC2) and NOT on Fargate/App Runner. See
# DEPLOY.md for the host cgroup-v1 requirement.

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "1"

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - rustpad
      - judge0-server
    <<: *default-logging

  rustpad:
    build: ./rustpad
    restart: always
    environment:
      # Persist pads to SQLite so interview sessions survive restarts.
      SQLITE_URI: /data/rustpad.db
      EXPIRY_DAYS: ${EXPIRY_DAYS:-30}
      RUST_LOG: info
    volumes:
      - rustpad-data:/data
    <<: *default-logging

  judge0-server:
    image: judge0/judge0:1.13.1
    restart: always
    privileged: true
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - db
      - redis
    <<: *default-logging

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    restart: always
    privileged: true
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - db
      - redis
    <<: *default-logging

  db:
    image: postgres:13.0
    restart: always
    env_file: judge0.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    <<: *default-logging

  redis:
    image: redis:6.2.6
    restart: always
    command:
      [
        "bash",
        "-c",
        'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"',
      ]
    env_file: judge0.conf
    volumes:
      - redis-data:/data
    <<: *default-logging

volumes:
  caddy-data:
  caddy-config:
  rustpad-data:
  postgres-data:
  redis-data:
