name: Build Rustpad image

# Builds the InterviewPad Rustpad image and pushes it to GHCR so the EC2 box
# can pull a ready image instead of compiling Rust/wasm on a small instance.

on:
  push:
    branches: [main]
    paths:
      - "rustpad/**"
      - ".github/workflows/build-rustpad.yml"
  workflow_dispatch:

env:
  # GHCR requires a lowercase repository name (the org is "Rebar-Team").
  IMAGE: ghcr.io/rebar-team/interview-pad-rustpad

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./rustpad
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
