name: Deploy

# Continuous deployment: on push to main, tell the box (via SSM) to fast-forward
# to origin/main and rebuild/recreate the stack. Requires the one-time
# "CD setup" workflow to have registered the instance with SSM.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  INSTANCE_ID: i-0b39e6eeddf7347e2

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Trigger deploy on the box via SSM
        run: |
          set -e
          cat > /tmp/params.json <<'JSON'
          {"commands":["cd /opt/interview-pad && git config --global --add safe.directory /opt/interview-pad && git fetch origin && git reset --hard origin/main && bash scripts/deploy.sh"]}
          JSON
          CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters file:///tmp/params.json \
            --timeout-seconds 1800 \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD"

          for i in $(seq 1 120); do
            ST=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            echo "status: $ST"
            case "$ST" in
              Success)
                echo "----- output -----"
                aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "----- stdout -----"; aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "----- stderr -----"; aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                exit 1 ;;
            esac
            sleep 15
          done
          echo "deploy timed out" >&2; exit 1
