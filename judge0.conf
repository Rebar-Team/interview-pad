# Judge0 configuration. This file is read by the judge0 server, workers, db,
# and redis containers. CHANGE THE TWO PASSWORDS BELOW before deploying.

################################################################################
# Postgres
################################################################################
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=CHANGE_ME_postgres_password

################################################################################
# Redis
################################################################################
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=CHANGE_ME_redis_password

################################################################################
# Execution
################################################################################
# Synchronous submissions (POST /submissions?wait=true). The frontend relies on
# this so a Run returns the result in one request.
ENABLE_WAIT_RESULT=true

# Per-run limits, sized for interview snippets (not a public API).
CPU_TIME_LIMIT=10
MAX_CPU_TIME_LIMIT=20
WALL_TIME_LIMIT=15
MAX_WALL_TIME_LIMIT=25
MEMORY_LIMIT=256000
MAX_MEMORY_LIMIT=512000
MAX_PROCESSES_AND_OR_THREADS=120
ENABLE_NETWORK=false

# This instance is not exposed directly to the internet (only via Caddy, and
# only /judge0/* is proxied). Leave auth off for a single trusted deployment;
# set AUTHN_TOKEN to require an X-Auth-Token header if you ever expose it.
# AUTHN_TOKEN=
